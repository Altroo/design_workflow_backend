[pytest]
DJANGO_SETTINGS_MODULE = design_workflow_backend.settings_test
# -- recommended but optional:
python_files = tests.py test_*.py *_tests.py
filterwarnings = ignore:'asyncio.*':DeprecationWarning
cache_dir = .tmp/pytest_cache
# Coverage options
addopts = -p no:cacheprovider --cov=design_workflow_backend --cov-branch --cov-report=term --cov-report=xml:coverage.xml --cov-config=.coveragerc
